experiment_id: h2_selector_validation
selected_path_id: UP2_selector_matrix_first
target_hypothesis_ids:
  - H2_scenario_conditioned_selector
baselines:
  - global_winner_static_policy
  - per_dimension_static_policy
  - unconstrained_latency_argmin
  - confidence_unaware_feasible_selector
